<!DOCTYPE html>
<html>
<head>
    <title>InsightDraft AI</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        textarea, input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f4f4f4; border-left: 5px solid #007bff; min-height: 50px; }
    </style>
</head>
<body>
    <h2>InsightDraft: Gen AI Document Analyzer</h2>
    <textarea id="docInput" rows="5" placeholder="Paste document content here..."></textarea>
    <input type="text" id="quesInput" placeholder="Ask a question about the document...">
    <button onclick="askAI()">Analyze with AI</button>
    
    <div id="result">Your answer will appear here...</div>

    <script>
        async function askAI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "Processing...";

            const payload = {
                document: document.getElementById('docInput').value,
                question: document.getElementById('quesInput').value
            };

            try {
                const response = await fetch('https://q8so9ngalk.execute-api.us-east-1.amazonaws.com/default/InsightDraft-Backend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                resultDiv.innerText = data.answer;
            } catch (error) {
                resultDiv.innerText = "Error connecting to API. Check CORS settings!";
            }
        }
    </script>
</body>
</html>
